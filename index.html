<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>सीखो — Kids Learning</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2E86AB">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;800&display=swap');

  :root{
    --sun: #FFB627;
    --sky: #2E86AB;
    --leaf: #4CA771;
    --berry: #E85D75;
    --cream: #FFF8EC;
    --ink: #2B2B2B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Nunito', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height:100vh;
  }
  header{
    background: var(--sky);
    padding: 22px 16px 60px;
    position: relative;
    overflow:hidden;
    text-align:center;
  }
  header::after{
    content:"";
    position:absolute; left:0; right:0; bottom:-1px;
    height:40px;
    background: var(--cream);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  header h1{
    font-family:'Baloo 2', cursive;
    color: white;
    font-size: 2rem;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  header p{
    color: #EAF6FF;
    margin: 0;
    font-weight:600;
    font-size: 0.95rem;
  }

  .langbar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin: -36px 12px 20px;
    position:relative;
    z-index:2;
  }
  .langbtn{
    font-family:'Baloo 2', cursive;
    font-size: 1rem;
    padding: 12px 20px;
    border-radius: 16px;
    border: none;
    cursor:pointer;
    color:white;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    transition: transform 0.12s ease;
  }
  .langbtn:active{ transform: translateY(3px); box-shadow:none; }
  .langbtn.active{ outline: 3px solid var(--ink); }
  .langbtn[data-lang="hi"]{ background: var(--berry); }
  .langbtn[data-lang="en"]{ background: var(--leaf); }
  .langbtn[data-lang="mr"]{ background: var(--sun); color:var(--ink); }
  .langbtn[data-lang="bho"]{ background:#8E5FD9; }

  main{
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  .section-label{
    font-family:'Baloo 2', cursive;
    font-size: 1.3rem;
    margin: 18px 4px 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .grid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  @media(min-width:640px){
    .grid{ grid-template-columns: 1fr 1fr; }
  }

  .card{
    background:white;
    border-radius: 20px;
    overflow:hidden;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    border: 3px solid transparent;
    transition: border-color 0.2s;
  }
  .card:hover{ border-color: var(--sun); }
  .card .frame-wrap{
    position:relative;
    padding-top: 56.25%;
    background:#000;
  }
  .card iframe{
    position:absolute; top:0; left:0; width:100%; height:100%; border:0;
  }
  .card .meta{
    padding: 12px 14px 16px;
  }
  .card .meta .name{
    font-family:'Baloo 2', cursive;
    font-size: 1.05rem;
    margin:0 0 2px;
  }
  .card .meta .tag{
    font-size: 0.8rem;
    color:#666;
    font-weight:600;
  }

  footer{
    text-align:center;
    padding: 10px 16px 30px;
    font-size: 0.8rem;
    color:#888;
  }
</style>
</head>
<body>

<header>
  <h1>🌈 सीखो — Mihir's Learning Corner</h1>
  <p>Sirf rhymes, stories aur seekhne wali cheezein</p>
</header>

<div class="langbar">
  <button class="langbtn active" data-lang="hi">हिंदी</button>
  <button class="langbtn" data-lang="en">English</button>
  <button class="langbtn" data-lang="mr">मराठी</button>
  <button class="langbtn" data-lang="bho">भोजपुरी</button>
</div>

<main>
  <div class="section-label" id="sectionTitle">🎈 हिंदी Rhymes &amp; Stories</div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  Curated channel list — is se bahar ki videos yahan nahi aayengi.
</footer>

<script>
const VIDEOS = {
  hi: [
    { id: "zuTwaiQ4kOE", name: "Top 25 Hindi Rhymes", tag: "Infobells" },
    { id: "tVw3NHmWcTs", name: "Chal Mere Ghode + more", tag: "Infobells" },
    { id: "ePT8Uksevc0", name: "Top 20 Hindi Rhymes & Balgeet", tag: "Infobells" },
    { id: "sUILEzqDK68", name: "Top 25 Hindi Rhymes for Children", tag: "Kids Learning Songs" },
  ],
  en: [
    { id: "DS1c2yKvLr4", name: "123 ABC Song, Learn English", tag: "Jugnu Kids" },
    { id: "V3-GITx9DSA", name: "ABC Song, Alphabet & Phonics", tag: "Jugnu Kids" },
    { id: "je2_qSZLb1Q", name: "Phonics Song, Learn English", tag: "Jugnu Kids" },
    { id: "o59pF5soQQQ", name: "ABC Song & Colour Songs", tag: "Jugnu Kids" },
  ],
  mr: [
    { id: "qQcRtnF3mLU", name: "Chiv Chiv Chimni, चिव चिव चिमणी", tag: "Marathi Balgeet" },
  ],
  bho: [
    { id: "n0vdy_FRUqg", name: "आहा टमाटर, Aaha Tamatar", tag: "Riya Rhymes Bhojpuri" },
    { id: "izYHoKfIU1o", name: "Popular Bhojpuri Nursery Rhymes", tag: "Riya Rhymes Bhojpuri" },
    { id: "qPXW9IOGWDA", name: "Twinkle Twinkle Little Star", tag: "Riya Rhymes Bhojpuri" },
  ]
};

const TITLES = {
  hi: "🎈 हिंदी Rhymes & Stories",
  en: "📚 English Rhymes & Learning",
  mr: "🌻 मराठी बालगीत",
  bho: "🎶 भोजपुरी गीत"
};

function render(lang){
  document.getElementById('sectionTitle').textContent = TITLES[lang];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  VIDEOS[lang].forEach(v => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="frame-wrap" data-id="${v.id}">
        <img class="thumb" src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" alt="${v.name}"
          style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;cursor:pointer;">
        <div class="playbtn" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
          width:60px;height:60px;background:rgba(0,0,0,0.6);border-radius:50%;display:flex;
          align-items:center;justify-content:center;pointer-events:none;">
          <div style="width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;
            border-left:20px solid white;margin-left:5px;"></div>
        </div>
      </div>
      <div class="meta">
        <p class="name">${v.name}</p>
        <p class="tag">${v.tag}</p>
      </div>`;
    grid.appendChild(card);
  });

  document.querySelectorAll('.frame-wrap').forEach(wrap => {
    wrap.addEventListener('click', () => {
      const id = wrap.dataset.id;
      wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1"
        title="video" loading="lazy" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"
        allow="accelerometer; autoplay; encrypted-media; gyroscope" allowfullscreen></iframe>`;
    }, { once: true });
  });
}

document.querySelectorAll('.langbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.langbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.lang);
  });
});

render('hi');

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
